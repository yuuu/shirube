name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shfmt:
    name: shfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mfinelli/setup-shfmt@v3
      - name: Check formatting
        # shirube.sh contains zsh-specific syntax (${(q)}) that shfmt cannot parse
        run: shfmt -d shirube.bash shirube.zsh shirube.plugin.bash shirube.plugin.zsh

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: shellcheck shirube.sh shirube.bash shirube.zsh shirube.plugin.bash shirube.plugin.zsh

  test:
    name: bats (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Run bats tests
        run: ./test/bats/bin/bats test/
